<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing & UI/UX Assistent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        serif: ['Georgia', 'Cambria', 'Times New Roman', 'serif'],
                        mono: ['SF Mono', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
                    },
                    colors: {
                        ink: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' },
                        indigo: { 550: '#4f46e5' },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-ink-50 text-ink-900 font-sans antialiased">

    <!-- Header -->
    <header class="bg-white border-b border-ink-200 sticky top-0 z-30">
        <div class="max-w-[1440px] mx-auto px-6 py-5 flex items-center gap-3">
            <span class="text-xl">✨</span>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-ink-900 uppercase">Marketing & UI/UX Assistent</h1>
                <p class="text-xs text-ink-400 mt-0.5">Strategische Ideen auf Basis deines Produkts</p>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="max-w-[1440px] mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-[340px_1fr] gap-8 items-start">

        <!-- Linke Spalte: Eingabe -->
        <aside class="bg-white border border-ink-200 rounded-lg shadow-sm lg:sticky lg:top-24">
            <form id="idea-form" class="p-6 space-y-6">

                <div>
                    <label for="product-input" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5"
003eProjekt / Produkt</label>
                    <input
                        type="text"
                        id="product-input"
                        placeholder="z.B. SaaS für Zeiterfassung"
                        required
                        class="w-full text-sm bg-ink-50 border border-ink-200 rounded-md px-3 py-2.5 text-ink-900 placeholder:text-ink-400 focus:outline-none focus:ring-2 focus:ring-indigo-550/20 focus:border-indigo-550 transition-colors"
                    >
                </div>

                <div>
                    <label for="target-group" class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-1.5">Zielgruppe</label>
                    <input
                        type="text"
                        id="target-group"
                        placeholder="z.B. Freelancer, Agenturen"
                        class="w-full text-sm bg-ink-50 border border-ink-200 rounded-md px-3 py-2.5 text-ink-900 placeholder:text-ink-400 focus:outline-none focus:ring-2 focus:ring-indigo-550/20 focus:border-indigo-550 transition-colors"
                    >
                </div>

                <div>
                    <p class="block text-[11px] font-semibold text-ink-500 uppercase tracking-wider mb-2">Bereiche</p>
                    <div class="space-y-1.5">
                        <button type="button" class="category-toggle w-full flex items-center gap-3 px-3 py-2.5 rounded-md border border-ink-200 bg-ink-50/50 hover:border-indigo-550/40 hover:bg-indigo-50/40 transition-all group text-left">
                            <input type="checkbox" name="category" value="heroCopy" checked class="w-4 h-4 text-indigo-550 border-ink-300 rounded focus:ring-indigo-550">
                            <span class="text-sm text-ink-700 font-medium">Hero Copy</span>
                        </button>
                        <button type="button" class="category-toggle w-full flex items-center gap-3 px-3 py-2.5 rounded-md border border-ink-200 bg-ink-50/50 hover:border-indigo-550/40 hover:bg-indigo-50/40 transition-all group text-left">
                            <input type="checkbox" name="category" value="ctaSuggestions" checked class="w-4 h-4 text-indigo-550 border-ink-300 rounded focus:ring-indigo-550">
                            <span class="text-sm text-ink-700 font-medium">CTA-Vorschläge</span>
                        </button>
                        <button type="button" class="category-toggle w-full flex items-center gap-3 px-3 py-2.5 rounded-md border border-ink-200 bg-ink-50/50 hover:border-indigo-550/40 hover:bg-indigo-50/40 transition-all group text-left">
                            <input type="checkbox" name="category" value="landingStructure" checked class="w-4 h-4 text-indigo-550 border-ink-300 rounded focus:ring-indigo-550">
                            <span class="text-sm text-ink-700 font-medium">Landingpage-Struktur</span>
                        </button>
                        <button type="button" class="category-toggle w-full flex items-center gap-3 px-3 py-2.5 rounded-md border border-ink-200 bg-ink-50/50 hover:border-indigo-550/40 hover:bg-indigo-50/40 transition-all group text-left">
                            <input type="checkbox" name="category" value="uxAudit" checked class="w-4 h-4 text-indigo-550 border-ink-300 rounded focus:ring-indigo-550">
                            <span class="text-sm text-ink-700 font-medium">UX-Audit</span>
                        </button>
                        <button type="button" class="category-toggle w-full flex items-center gap-3 px-3 py-2.5 rounded-md border border-ink-200 bg-ink-50/50 hover:border-indigo-550/40 hover:bg-indigo-50/40 transition-all group text-left">
                            <input type="checkbox" name="category" value="abTestIdeas" checked class="w-4 h-4 text-indigo-550 border-ink-300 rounded focus:ring-indigo-550">
                            <span class="text-sm text-ink-700 font-medium">A/B-Test-Ideen</span>
                        </button>
                    </div>
                </div>

                <button
                    type="submit"
                    id="submit-btn"
                    class="w-full bg-ink-900 hover:bg-ink-800 text-white text-sm font-semibold py-2.5 rounded-md transition-colors flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed"
                >
                    <span class="btn-text">Ideen generieren</span>
                    <span class="btn-loader hidden items-center gap-2">
                        <span class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                        <span>Analysiere…</span>
                    </span>
                </button>
            </form>

            <div id="status-bar" class="px-6 pb-5 hidden"></div>
        </aside>

        <!-- Rechte Spalte: Ausgabe -->
        <section class="min-w-0">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-lg font-bold text-ink-900 tracking-tight">Ergebnisse</h2>
                <button type="button" id="clear-btn" class="text-xs font-semibold text-ink-500 hover:text-ink-900 uppercase tracking-wider transition-colors">
                    Zurücksetzen
                </button>
            </div>

            <div id="cards-container" class="grid grid-cols-1 xl:grid-cols-2 gap-4">
                <!-- Empty-State -->
                <div id="empty-state" class="col-span-1 xl:col-span-2 text-center py-20 border-2 border-dashed border-ink-200 rounded-lg bg-white">
                    <div class="text-4xl mb-4">💡</div>
                    <h3 class="text-sm font-bold text-ink-900 mb-1">Noch keine Ideen generiert</h3>
                    <p class="text-sm text-ink-400 max-w-xs mx-auto">Trage dein Projekt ein und wähle die gewünschten Bereiche aus.</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="border-t border-ink-200 bg-white mt-auto">
        <div class="max-w-[1440px] mx-auto px-6 py-4 flex items-center justify-between">
            <small class="text-[11px] text-ink-400">Bereit für LLM-Integration via <code class="font-mono text-ink-600 bg-ink-100 px-1 py-0.5 rounded">js/api.js</code></small>
            <span class="text-[11px] text-ink-400">Strategisches Marketing-Tool</span>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
